<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FigureLab · 荧光 / IHC 组图</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="suitebar">
      <a class="suite-brand" href="/" aria-label="FigureLab 科研组图首页">
        <span class="suite-mark" aria-hidden="true">Fig</span>
        <span>FigureLab</span>
      </a>
      <nav class="suite-tabs" aria-label="组图工具">
        <a class="suite-tab" href="/" aria-current="page">荧光 / IHC</a>
        <a class="suite-tab" href="/wb">WB 组图</a>
      </nav>
    </header>
    <main class="shell">
      <section class="toolbar">
        <div class="title-block">
          <h1>荧光 / IHC 组图</h1>
          <p id="summary">支持 IF 荧光图和 IHC 组化图，选择文件夹后按论文组图样式自动排版。</p>
          <p class="data-note"><strong>服务器处理：</strong>图片会上传到本服务以生成预览和导出文件，请只上传允许处理的数据。</p>
        </div>

        <div class="controls">
          <label class="file-picker">
            <input id="folderInput" type="file" webkitdirectory directory multiple accept=".tif,.tiff,.png,.jpg,.jpeg,.bmp">
            选择文件夹
          </label>
          <button id="uploadBtn" type="button" disabled>读取并分组</button>
          <button id="exportBtn" type="button" disabled>导出 PPTX</button>
        </div>
      </section>

      <section class="settings">
        <label>
          图题
          <input id="deckTitle" type="text" value="" placeholder="可留空">
        </label>
        <label>
          面板字母
          <input id="panelLetter" type="text" value="" placeholder="例如 F">
        </label>
        <label>
          图型
          <select id="figureType">
            <option value="if" selected>IF 荧光图</option>
            <option value="ihc">IHC 组化图</option>
          </select>
        </label>
        <label>
          排版方式
          <select id="layoutMode">
            <option value="auto" selected>自动识别</option>
            <option value="manual">手动数量</option>
          </select>
        </label>
        <label class="manual-only" hidden>
          组别数量
          <input id="groupCount" type="number" min="1" max="50" value="1">
        </label>
        <label class="manual-only" hidden>
          每组图片数
          <input id="imagesPerGroup" type="number" min="1" max="20" value="4">
        </label>
        <label>
          每页组数
          <select id="rowsPerSlide">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </label>
        <label>
          组别位置
          <select id="groupLabelSide">
            <option value="left" selected>左侧</option>
            <option value="right">右侧</option>
          </select>
        </label>
        <label>
          图片方式
          <select id="fitMode">
            <option value="crop" selected>方形裁切</option>
            <option value="contain">完整保留</option>
          </select>
        </label>
        <label>
          背景
          <select id="background">
            <option value="white" selected>白底</option>
            <option value="black">黑底</option>
          </select>
        </label>
        <label>
          导出格式
          <select id="exportFormat">
            <option value="pptx" selected>PPTX</option>
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="pdf">PDF</option>
          </select>
        </label>
        <label class="check-label">
          <input id="showSampleName" type="checkbox" checked>
          显示组别名
        </label>
      </section>

      <section id="ihcSettings" class="settings" hidden>
        <label>
          低倍列名
          <input id="ihcLowLabel" type="text" value="4X">
        </label>
        <label>
          高倍列名
          <input id="ihcHighLabel" type="text" value="20X">
        </label>
        <label>
          ROI X
          <input id="ihcRoiX" type="number" min="0" max="1" step="0.05" value="0.32">
        </label>
        <label>
          ROI Y
          <input id="ihcRoiY" type="number" min="0" max="1" step="0.05" value="0.36">
        </label>
        <label>
          ROI 宽
          <input id="ihcRoiW" type="number" min="0.05" max="1" step="0.05" value="0.30">
        </label>
        <label>
          ROI 高
          <input id="ihcRoiH" type="number" min="0.05" max="1" step="0.05" value="0.28">
        </label>
        <label class="check-label">
          <input id="ihcDrawConnectors" type="checkbox" checked>
          显示连线
        </label>
      </section>

      <section id="progressPanel" class="progress-panel" hidden>
        <div class="progress-meta">
          <span id="phaseText">准备上传</span>
          <span id="elapsedText">0.0s</span>
        </div>
        <div class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressDetail" class="progress-detail">等待开始。</div>
      </section>

      <section id="channelPanel" class="channel-panel" hidden>
        <div class="section-title">顶部 marker 名称</div>
        <div id="channels" class="channels"></div>
      </section>

      <section id="groupPanel" class="group-panel" hidden>
        <div class="section-title">侧边组别名称</div>
        <div id="groupLabels" class="group-labels"></div>
      </section>

      <section class="preview-head">
        <div class="section-title">预览</div>
        <div id="status" class="status">尚未选择文件夹</div>
      </section>
      <section id="preview" class="preview empty">
        <div class="empty-text">预览会显示在这里。</div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
